services:
  hako:
    image: filebrowser/filebrowser:v2.63.14-s6
    container_name: fb
    volumes:
      - webroot:/srv
      - ../../.fb/branding:/branding
      - ../../.fb/filebrowser.db:/database/filebrowser.db
      - ../../.fb/settings.json:/config/settings.json
    depends_on:
      - nginx
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q -O /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    mem_limit: 256m
    cpus: 1.0
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: 2
