user  nginx;
worker_processes  auto;
pid /var/run/nginx.pid;
events { worker_connections  1024; }

quic_bpf on;

http
{
    charset utf-8;
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    quic_retry on;
    quic_gso on;
    http3_hq on;

    limit_req_zone $binary_remote_addr zone=g41_rl:10m rate=30r/s;
    
    include /etc/nginx/conf.d/zones/*.conf;
    include /etc/nginx/conf.d/upstreams/*.conf;

    server 
    {
        listen 80 ipv6only=off default_server;
        server_name _;
        location = /41 { return 204; }
        location = /img/Pic_G41_Dhx.png { root /webroot/G41; }
        location / { return 301 https://$host$request_uri; }
    }
    
    server
    {
        # listen [::]:443 ipv6only=off quic reuseport so_keepalive=on default_server;
        listen 443 ipv6only=off ssl reuseport so_keepalive=on default_server;
        server_name _;
        ssl_certificate     /certs/fc;
        ssl_certificate_key /certs/k;
        ssl_protocols TLSv1.3;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' ws: wss:; img-src 'self' data:; style-src 'self' 'unsafe-inline'" always;

        root /webroot/G41;
        index G41.html;
        error_page 404 /G41.html;
        error_page 500 502 504 /G41.html;
        include /etc/nginx/conf.d/locations/*.conf;
    }

    include /etc/nginx/conf.d/servers/*.conf;
}