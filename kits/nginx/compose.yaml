services:
  nginx:
    image: nginx:alpine
    container_name: gx
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    labels:
      - sh.acme.autoload.domain=${G41_DOMAIN}
    volumes:
      - certs:/certs
      - ../../.gx:/etc/nginx
      - webroot:/webroot
    depends_on:
      dns:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null --no-check-certificate http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    cpus: 1.0
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: 3
