services:
  tracker:
    build:
      context: ../..
      dockerfile: kits/tracker/Dockerfile
    container_name: wt
    depends_on:
      - hako
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8000/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    mem_limit: 256m
    cpus: 1.0
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: 2
