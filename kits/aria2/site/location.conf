location /aria2
{
    add_header Content-Security-Policy "default-src * 'unsafe-inline' 'unsafe-eval' data: blob: ws: wss:" always;
    alias /webroot;
    index aria2.html;
}
location /aria2rpc
{
    client_max_body_size 0;
    add_header Front-End-Https on;
    add_header Accept-Ranges bytes;

    proxy_redirect off;
    proxy_intercept_errors off;
    proxy_set_header Host $http_host;
    proxy_set_header X-NginX-Proxy true;
    proxy_set_header Connection "upgrade";
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    proxy_pass http://ar/jsonrpc;
}

location /aria2/share
{
    alias /webroot/hako/Aria2;

    client_max_body_size 100m;
    add_header Accept-Ranges bytes;    
    client_body_temp_path /webroot/davtmp;
    create_full_put_path on;
    
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;
    dav_methods PUT DELETE MKCOL COPY MOVE;
    dav_access user:rw group:rw all:rw;
    allow all;
}
