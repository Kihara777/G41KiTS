<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>弹幕语音播报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
            font-size: 16px;
            line-height: 1.4;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,.7);
        }
        #chat-overlay {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            display: flex;
            flex-direction: column-reverse;
            padding: 0 12px 12px;
            pointer-events: none;
        }
        .msg {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 4px 8px;
            margin-bottom: 2px;
            border-radius: 4px;
            background: rgba(0,0,0,.35);
            animation: msgIn .25s ease-out;
            transition: opacity .5s, transform .5s;
            max-width: 100%;
            word-break: break-word;
        }
        .msg.removing { opacity: 0; transform: translateX(24px); }
        .msg.gift { background: rgba(233,180,80,.25); }
        .msg.member { background: rgba(220,80,120,.30); }
        .msg.sc { background: rgba(230,180,30,.35); border-left: 3px solid #e6b41e; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            background: rgba(255,255,255,.1);
            object-fit: cover;
        }
        .msg-body { flex: 1; min-width: 0; }
        .msg-header { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .msg-name { font-weight: 700; color: #a0d8ef; }
        .msg-name.owner { color: #ffd700; }
        .msg-name.admin { color: #ff6b6b; }
        .msg-badge {
            font-size: 10px; padding: 0 4px; border-radius: 2px;
            background: rgba(255,255,255,.15); color: #ccc;
            line-height: 16px; white-space: nowrap;
        }
        .msg-badge.guard-lv3 { background: #d81e06; color: #fff; }
        .msg-badge.guard-lv2 { background: #e67225; color: #fff; }
        .msg-badge.guard-lv1 { background: #a068d1; color: #fff; }
        .msg-badge.medal { background: rgba(255,255,255,.1); }
        .msg-content { color: #eee; font-size: 15px; margin-top: 1px; }
        .msg-content .emoji { display: inline-block; height: 1.2em; vertical-align: -.2em; }
        .msg-price { color: #f5c842; font-weight: 700; }
        .msg-gift-icon { width: 20px; height: 20px; vertical-align: -.4em; margin: 0 2px; }
        .msg-translation { color: #8ec8a0; font-size: 13px; margin-top: 1px; font-style: italic; }
        .msg-sc-content { background: rgba(255,215,0,.08); padding: 4px 8px; border-radius: 3px; margin-top: 2px; font-size: 15px; color: #ffeaa7; }
    </style>
</head>
<body>
    <div id="chat-overlay"></div>
    <script src="./blcsdk.js"></script>
    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            rate: 2.0, minGiftPrice: 0, minTextLen: 1, maxTextLen: 80,
            pitch: 1.0, volume: 1.0, lang: 'zh-CN',
            maxMessages: 30, msgLifetime: 28000, fadeDuration: 500,
            debug: /[?&]debug=1/.test(location.search),
        };

        // ==================== DOM 工具 ====================
        const overlay = document.getElementById('chat-overlay');
        const msgMap = {}; // id -> DOM element

        function removeMsg(id, animate = true) {
            const el = msgMap[id];
            if (!el) return;
            if (animate) {
                el.classList.add('removing');
                setTimeout(() => { el.remove(); delete msgMap[id]; }, CONFIG.fadeDuration);
            } else {
                el.remove(); delete msgMap[id];
            }
        }

        function pruneMessages() {
            const msgs = overlay.querySelectorAll('.msg');
            const excess = msgs.length - CONFIG.maxMessages;
            if (excess > 0) {
                for (let i = 0; i < excess; i++) {
                    const el = msgs[msgs.length - 1 - i];
                    if (el && el.dataset.id) removeMsg(el.dataset.id, false);
                }
            }
        }

        function addMsgDom(msg, html) {
            const el = document.createElement('div');
            el.className = 'msg ' + msg.typeClass;
            el.dataset.id = msg.id;
            el.innerHTML = html;
            overlay.prepend(el);
            msgMap[msg.id] = el;
            pruneMessages();
            if (msg.type !== blcsdk.MsgType.SUPER_CHAT) {
                setTimeout(() => removeMsg(msg.id), CONFIG.msgLifetime);
            }
            return el;
        }

        // ==================== 视觉渲染 ====================
        function guardBadge(level) {
            const GL = blcsdk.GuardLevel;
            if (level === GL.LV3) return '<span class="msg-badge guard-lv3">总督</span>';
            if (level === GL.LV2) return '<span class="msg-badge guard-lv2">提督</span>';
            if (level === GL.LV1) return '<span class="msg-badge guard-lv1">舰长</span>';
            return '';
        }

        function medalBadge(name, level) {
            if (!name || level <= 0) return '';
            return `<span class="msg-badge medal">${esc(name)} ${level}</span>`;
        }

        function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        function authorHtml(msg) {
            const AT = blcsdk.AuthorType;
            const nameClass = msg.authorType === AT.OWNER ? 'owner' : (msg.authorType === AT.ADMIN ? 'admin' : '');
            const name = esc(msg.authorName || '');
            const gb = guardBadge(msg.privilegeType);
            const mb = medalBadge(msg.medalName, msg.medalLevel);
            return `<span class="msg-name ${nameClass}">${name}</span>${gb}${mb}`;
        }

        function contentPartsHtml(parts) {
            if (!parts || !parts.length) return '';
            const CPT = blcsdk.ContentPartType;
            return parts.map(p => {
                if (p.type === CPT.IMAGE) return `<img class="emoji" src="${esc(p.url)}" alt="${esc(p.text)}" onerror="this.style.display='none'">`;
                return esc(p.text);
            }).join('');
        }

        function renderText(msg) {
            return `
                <img class="msg-avatar" src="${esc(msg.avatarUrl)}" onerror="this.style.display='none'" loading="lazy">
                <div class="msg-body">
                    <div class="msg-header">${authorHtml(msg)}</div>
                    <div class="msg-content">${contentPartsHtml(msg.contentParts) || esc(msg.content)}</div>
                    ${msg.translation ? `<div class="msg-translation">${esc(msg.translation)}</div>` : ''}
                </div>`;
        }

        function renderGift(msg) {
            const price = msg.price || 0;
            const priceStr = price > 0 ? ` <span class="msg-price">¥${price}</span>` : '';
            return `
                <img class="msg-avatar" src="${esc(msg.avatarUrl)}" onerror="this.style.display='none'" loading="lazy">
                <div class="msg-body">
                    <div class="msg-header">${authorHtml(msg)}</div>
                    <div class="msg-content">
                        ${msg.giftIconUrl ? `<img class="msg-gift-icon" src="${esc(msg.giftIconUrl)}" onerror="this.style.display='none'">` : ''}
                        送出 ${esc(msg.giftName)} ×${msg.num}${priceStr}
                    </div>
                </div>`;
        }

        function renderMember(msg) {
            const GL = blcsdk.GuardLevel;
            const labels = { [GL.LV3]: '总督', [GL.LV2]: '提督', [GL.LV1]: '舰长' };
            const label = labels[msg.privilegeType] || '舰长';
            const price = msg.price > 0 ? ` <span class="msg-price">¥${msg.price}</span>` : '';
            return `
                <img class="msg-avatar" src="${esc(msg.avatarUrl)}" onerror="this.style.display='none'" loading="lazy">
                <div class="msg-body">
                    <div class="msg-header">${authorHtml(msg)}</div>
                    <div class="msg-content">🎉 开通了 <b>${label}</b> ${msg.num}${msg.unit || '月'}${price}</div>
                </div>`;
        }

        function renderSuperChat(msg) {
            const price = msg.price > 0 ? ` <span class="msg-price">¥${msg.price}</span>` : '';
            return `
                <img class="msg-avatar" src="${esc(msg.avatarUrl)}" onerror="this.style.display='none'" loading="lazy">
                <div class="msg-body">
                    <div class="msg-header">${authorHtml(msg)} ${price}</div>
                    <div class="msg-sc-content">${esc(msg.content)}</div>
                    ${msg.translation ? `<div class="msg-translation">${esc(msg.translation)}</div>` : ''}
                </div>`;
        }

        // ==================== TTS 引擎（双队列：普通排队，礼物/进房独立队列可插队） ====================
        const normalQueue = [];     // 弹幕、醒目留言
        const priorityQueue = [];   // 礼物、上舰（互不覆盖，内部排队）
        let currentSource = 'none'; // 'none' | 'normal' | 'priority'

        function makeUtterance(text) {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = CONFIG.lang; u.rate = CONFIG.rate; u.pitch = CONFIG.pitch; u.volume = CONFIG.volume;
            const voices = window.speechSynthesis.getVoices();
            if (voices.length) {
                let v = voices.find(v => v.lang === 'zh-CN' && (v.name.includes('Xiao') || v.name.includes('Yun') || v.name.includes('Microsoft')))
                    || voices.find(v => v.lang === 'zh-CN' && v.name.includes('Google'))
                    || voices.find(v => v.lang === 'zh-CN')
                    || voices.find(v => v.lang.startsWith('zh'));
                if (v) { u.voice = v; if (CONFIG.debug) console.debug('[TTS] 语音:', v.name, v.lang); }
            }
            return u;
        }

        function speakNext() {
            // 优先消费 priority 队列
            if (priorityQueue.length > 0) {
                currentSource = 'priority';
                const u = priorityQueue.shift();
                u.onend = u.onerror = () => speakNext();
                if (CONFIG.debug) console.debug('[TTS] priority 播报, 剩余:', priorityQueue.length);
                window.speechSynthesis.speak(u);
                return;
            }
            // 其次消费 normal 队列
            if (normalQueue.length > 0) {
                currentSource = 'normal';
                const u = normalQueue.shift();
                u.onend = u.onerror = () => speakNext();
                if (CONFIG.debug) console.debug('[TTS] normal 播报, 剩余:', normalQueue.length);
                window.speechSynthesis.speak(u);
                return;
            }
            currentSource = 'none';
        }

        /** @param {string} text @param {boolean} priority */
        function speak(text, priority = false) {
            if (!window.speechSynthesis) { console.warn('[TTS] 不支持 Web Speech API'); return; }
            const u = makeUtterance(text);
            if (priority) {
                // 礼物/进房：只有当前在播 normal 时才打断；若已在播 priority，则排队等
                if (currentSource === 'normal') {
                    window.speechSynthesis.cancel();
                    currentSource = 'none';
                }
                priorityQueue.push(u);
                if (CONFIG.debug) console.debug('[TTS] priority 入队, 队列长度:', priorityQueue.length);
            } else {
                normalQueue.push(u);
                if (CONFIG.debug) console.debug('[TTS] normal 入队, 队列长度:', normalQueue.length);
            }
            if (currentSource === 'none') speakNext();
        }

        function extractTtsText(msg) {
            const MT = blcsdk.MsgType;
            const GL = blcsdk.GuardLevel;
            switch (msg.type) {
                case MT.TEXT: {
                    const c = (msg.content || '').trim();
                    if (!c || c.length < CONFIG.minTextLen) return null;
                    const t = c.length > CONFIG.maxTextLen ? c.slice(0, CONFIG.maxTextLen) + '…' : c;
                    return `${msg.authorName || '有人'}：${t}`;
                }
                case MT.GIFT: {
                    if (msg.price < CONFIG.minGiftPrice && !msg.totalFreeCoin) return null;
                    const n = msg.authorName || '有人', g = msg.giftName || '礼物', c = msg.num || 1;
                    return msg.price > 0 ? `感谢 ${n} 送的 ${g}，${c}个，共${msg.price}元` : `感谢 ${n} 送的 ${g} x ${c}`;
                }
                case MT.MEMBER: {
                    const n = msg.authorName || '有人', c = msg.num || 1, u = msg.unit || '月';
                    const labels = { [GL.LV3]: '提督', [GL.LV2]: '总督', [GL.LV1]: '舰长' };
                    const l = labels[msg.privilegeType];
                    return l ? `感谢 ${n} 开通${l} ${c}${u}` : `感谢 ${n} 上舰 ${c}${u}`;
                }
                case MT.SUPER_CHAT: {
                    const n = msg.authorName || '有人', c = (msg.content || '').trim(), p = msg.price || 0;
                    return p > 0 ? `${n} 的${p}元醒目留言：${c}` : `${n} 的醒目留言：${c}`;
                }
                default: return null;
            }
        }

        // ==================== 消息处理器 ====================
        class HybridHandler extends blcsdk.MsgHandler {
            addMsg(msg) {
                if (CONFIG.debug) console.debug('[Hybrid]', msg.type, msg);
                const MT = blcsdk.MsgType;
                let typeClass = '';
                let html = '';
                switch (msg.type) {
                    case MT.TEXT:
                        typeClass = 'text';
                        html = renderText(msg);
                        break;
                    case MT.GIFT:
                        typeClass = 'gift';
                        html = renderGift(msg);
                        break;
                    case MT.MEMBER:
                        typeClass = 'member';
                        html = renderMember(msg);
                        break;
                    case MT.SUPER_CHAT:
                        typeClass = 'sc';
                        html = renderSuperChat(msg);
                        break;
                    default: return;
                }
                msg.typeClass = typeClass;
                addMsgDom(msg, html);

                // TTS — 礼物和上舰允许插队（打断当前语音）
                const ttsText = extractTtsText(msg);
                const isPriority = (msg.type === MT.GIFT || msg.type === MT.MEMBER);
                if (ttsText) speak(ttsText, isPriority);
            }

            delMsgs(ids) {
                if (ids) ids.forEach(id => removeMsg(id));
            }

            updateMsg(id, newValues) {
                const el = msgMap[id];
                if (!el) return;
                // 更新翻译
                if (newValues.translation) {
                    let transEl = el.querySelector('.msg-translation');
                    if (transEl) {
                        transEl.textContent = newValues.translation;
                    } else {
                        const body = el.querySelector('.msg-body');
                        if (body) {
                            const div = document.createElement('div');
                            div.className = 'msg-translation';
                            div.textContent = newValues.translation;
                            body.appendChild(div);
                        }
                    }
                }
                // 更新 SC 内容
                if (newValues.content && el.classList.contains('sc')) {
                    const scEl = el.querySelector('.msg-sc-content');
                    if (scEl) scEl.textContent = newValues.content;
                }
            }
        }

        // ==================== 初始化 ====================
        (async function() {
            try {
                const handler = new HybridHandler();
                blcsdk.setMsgHandler(handler);

                // 预热语音
                let voices = window.speechSynthesis.getVoices();
                if (!voices.length) {
                    await new Promise(r => { window.speechSynthesis.onvoiceschanged = r; });
                    voices = window.speechSynthesis.getVoices();
                }
                if (CONFIG.debug) console.debug('[Hybrid] 语音数:', voices.length);

                await blcsdk.init();
                console.log('[Hybrid] 混合模板就绪，blivechat:', blcsdk.getBlcVersion());
                if (CONFIG.debug) console.debug('[Hybrid] SDK版本:', blcsdk.getVersion(), '配置:', CONFIG);
            } catch (err) {
                console.error('[Hybrid] 初始化失败:', err);
            }
        })();
    </script>
</body>
</html>
