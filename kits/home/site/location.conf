add_header Alt-Svc 'h3=":443"; ma=2592000, h3-27=":443"; ma=2592000, h3-28=":443"; ma=2592000, h3-29=":443"; ma=2592000, h3-Q043=":443"; ma=2592000, h3-Q046=":443"; ma=2592000, h3-Q050=":443"; ma=2592000, quic=":443"; ma=2592000; v="43,46,50"';

http2 on;
client_header_timeout 52w;
keepalive_timeout 52w;
client_body_timeout 52w;
grpc_read_timeout 52w;

ssl_protocols TLSv1.3;
ssl_early_data on;
ssl_session_tickets on;
ssl_certificate /certs/fc;
ssl_certificate_key /certs/k;

add_header Strict-Transport-Security "max-age=63072000" always;
ssl_stapling on;
ssl_stapling_verify on;
ssl_trusted_certificate /certs/fc;

limit_req zone=g41_rl burst=50 nodelay;

root /webroot/G41;
error_page 403 404 418 451 497 /G41.html;
error_page 300 301 302 303 304 305 306 307 308 /G41.html;
error_page 400 401 402 405 406 407 408 409 410 411 412 413 414 415 416 417 419 421 422 423 424 425 426 428 429 431 /G41.html;
error_page 500 501 502 503 504 505 506 507 508 510 511 /G41.html;

location = /204 { return 204; }

location ~ "^/e/(\d+)$" {
    error_page 418 =200 /G41.html;
    return 418;
}

proxy_intercept_errors on;

