services:
  acme:
    build:
      context: ../..
      dockerfile: kits/acme/Dockerfile
    container_name: ca
    stdin_open: true
    tty: true
    environment:
      - CF_Key=${CF_Key}
      - CF_Email=${CF_Email}
      - DEPLOY_DOCKER_CONTAINER_LABEL=sh.acme.autoload.domain=${G41_DOMAIN}
      - DEPLOY_DOCKER_CONTAINER_RELOAD_CMD=${ACME_RELOAD_CMD:-nginx -s reload}
      - DOCKER_HOST=tcp://ds:2375
    volumes:
      - certs:/acme.sh
    healthcheck:
      test: ["CMD", "sh", "-c", "acme.sh --list 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    mem_limit: 128m
    cpus: 0.5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: 2
