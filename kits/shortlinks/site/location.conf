# Known short links
location ~ "^/(7z|dotnet|dx11|vcredist|vs|vscode)$" {
    proxy_intercept_errors off;
    proxy_pass http://api/link/$1;
}

# Wildcard short links (hysteria2 subscriptions, dynamic tokens)
location ~ "^/([A-Za-z0-9%+_=-]{20,})$" {
    proxy_intercept_errors off;
    proxy_pass http://api/link/$1;
}

location /conf/ {
    proxy_pass http://api/conf/;
}
