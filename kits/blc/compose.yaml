services:
  blc:
    image: xfgryujk/blivechat
    container_name: lc
    volumes:
      - ../../.lc/config.ini:/mnt/data/data/config.ini
      - ../../.lc/database.db:/mnt/data/data/database.db
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q -O /dev/null http://127.0.0.1:12450/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 256m
    cpus: 1.0
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: 2
